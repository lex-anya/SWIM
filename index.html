        function getProgress() {
          return 1 - scrollY / (WORLD_H - H);
        }
        function getWaterColor(p) {
          return `rgb(${Math.round(4 + p * 38)},${Math.round(15 + p * 107)},${Math.round(20 + p * 118)})`;
        }

        function drawSwimScene() {
          const progress = getProgress();
          ctx.fillStyle = getWaterColor(progress);
          ctx.fillRect(0, 0, W, H);
          const dg = ctx.createLinearGradient(0, 0, 0, H);
          dg.addColorStop(0, "transparent");
          dg.addColorStop(1, `rgba(0,0,0,${0.35 - progress * 0.25})`);
          ctx.fillStyle = dg;
          ctx.fillRect(0, 0, W, H);
          // rays
          const ro = 0.05 + progress * 0.07;
          rays3.forEach((r, i) => {
            const sw = Math.sin(t * 0.3 + i) * 15;
            const rg = ctx.createLinearGradient(r.x + sw, 0, r.x + sw, H * 0.8);
            rg.addColorStop(0, `rgba(150,220,240,${ro})`);
            rg.addColorStop(1, "transparent");
            ctx.fillStyle = rg;
            ctx.beginPath();
            ctx.moveTo(r.x + sw, 0);
            ctx.lineTo(r.x + sw + r.width, 0);
            ctx.lineTo(r.x + sw + r.width * 2, H * 0.8);
            ctx.lineTo(r.x + sw - r.width, H * 0.8);
            ctx.closePath();
            ctx.fill();
          });
          // bubbles
          bubbles.forEach((b2) => {
            const sy = b2.worldY - scrollY;
            if (sy < -10 || sy > H + 10) return;
            ctx.beginPath();
            ctx.arc(b2.x, sy, b2.size, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(150,210,230,${b2.opacity})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
            b2.worldY -= b2.speed;
            b2.x += Math.sin(t * 1.2 + b2.wobble) * 1.2;
            if (b2.worldY < 0) {
              b2.worldY = WORLD_H;
              b2.x = Math.random() * W;
            }
          });
          // chests
          swimChests.forEach((c, i) => {
            if (c.solved) return;
            const sy = c.worldY - scrollY;
            if (sy < -80 || sy > H + 80) return;
            const glow = ctx.createRadialGradient(c.x, sy, 0, c.x, sy, 65);
            glow.addColorStop(0, `rgba(255,200,100,${0.08 + progress * 0.1})`);
            glow.addColorStop(1, "transparent");
            ctx.fillStyle = glow;
            ctx.fillRect(c.x - 65, sy - 65, 130, 130);
            ctx.save();
            ctx.translate(c.x, sy);
            const img = chestImages[i];
            if (img.complete) ctx.drawImage(img, -35, -35, 70, 70);
            ctx.restore();
          });
          // vignette
          const v = ctx.createRadialGradient(
            W / 2,
            H / 2,
            H * 0.2,
            W / 2,
            H / 2,
            H * 0.85,
          );
          v.addColorStop(0, "transparent");
          v.addColorStop(1, "rgba(0,0,0,0.55)");
          ctx.fillStyle = v;
          ctx.fillRect(0, 0, W, H);
          // flash
          if (surfaceFlash > 0) {
            ctx.fillStyle = `rgba(200,240,255,${surfaceFlash})`;
            ctx.fillRect(0, 0, W, H);
          }
        }

        const onWheel = (e) => {
          if (overlayOpen || autoScrolling || scrollLocked) return;
          const delta = e.deltaY,
            newTarget = targetScrollY + delta * 0.8;
          const firstChestLimit = swimChests[0].worldY - H * 0.45;
          targetScrollY = Math.max(
            firstChestLimit,
            Math.min(WORLD_H - H, newTarget),
          );
          if (targetScrollY <= firstChestLimit) {
            targetScrollY = firstChestLimit;
            scrollLocked = true;
          }
        };
        window.addEventListener("wheel", onWheel);

        setCanvasClick((e) => {
          if (overlayOpen) return;
          if (currentChest >= swimChests.length) return;
          const c = swimChests[currentChest];
          const sy = c.worldY - scrollY;
          const d = Math.sqrt((e.clientX - c.x) ** 2 + (e.clientY - sy) ** 2);
          if (d < 55) {
            if (appAudioCtx && appAudioCtx.state === "suspended")
              appAudioCtx.resume();
            openBook(currentChest);
          }
        });

        scheduleRAF(() => {
          t += 0.04;
          if (autoScrolling) {
            scrollY += (autoScrollTarget - scrollY) * autoScrollSpeed;
            targetScrollY = scrollY;
            if (Math.abs(scrollY - autoScrollTarget) < 0.5) {
              scrollY = autoScrollTarget;
              autoScrolling = false;
            }
          } else {
            scrollY += (targetScrollY - scrollY) * 0.1;
          }
          if (currentChest >= swimChests.length && flashStarted) {
            surfaceFlash = Math.min(surfaceFlash + 0.015, 1);
            if (surfaceFlash >= 0.3 && !flashHold) {
              flashHold = true;
              audio.pause();
              audio.src = "ARIRANG/IntotheSun.mp3";
              audio.load();
              audio.addEventListener(
                "canplaythrough",
                () => {
                  audio.currentTime = 180;
                  audio.play();
                },
                { once: true },
              );
              setTimeout(() => goToScene("serendipity"), 2500);
            }
          }
          scrollY = Math.max(0, Math.min(WORLD_H - H, scrollY));
          ctx.clearRect(0, 0, W, H);
          drawSwimScene();
        });

        return {
          destroy() {
            window.removeEventListener("wheel", onWheel);
          },
        };
      };

      // ---- 10. SERENDIPITY (ship side, right hull) ----
      SCENES.serendipity = function () {
        let t = 0,
          bobOffset = 0,
          sceneTimer = 0;
        const WATERLINE = H * 0.55,
          HULL_LEFT = W * 0.55;

        // Fade in on load
        document.body.style.opacity = 0;
        setTimeout(() => {
          document.body.style.transition = "opacity 4s ease";
          document.body.style.opacity = 1;
        }, 50);

        function drawSky() {
          const sky = ctx.createLinearGradient(0, 0, 0, WATERLINE);
          sky.addColorStop(0, "#2e5a7a");
          sky.addColorStop(0.6, "#4a7a9a");
          sky.addColorStop(1, "#6a9ab8");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, W, WATERLINE);
          const sg = ctx.createRadialGradient(
            W * 0.25,
            H * 0.38,
            0,
            W * 0.25,
            H * 0.38,
            W * 0.35,
          );
          sg.addColorStop(0, "rgba(255,210,120,0.3)");
          sg.addColorStop(0.4, "rgba(255,180,80,0.09)");
          sg.addColorStop(1, "transparent");
          ctx.fillStyle = sg;
          ctx.fillRect(0, 0, W, WATERLINE);
        }
        function drawWater() {
          const water = ctx.createLinearGradient(0, WATERLINE, 0, H);
          water.addColorStop(0, "#2a7a96");
          water.addColorStop(0.4, "#1a5a75");
          water.addColorStop(1, "#0e3a52");
          ctx.fillStyle = water;
          ctx.fillRect(0, WATERLINE, W, H - WATERLINE);
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, WATERLINE);
          ctx.lineTo(W, WATERLINE);
          ctx.stroke();
          for (let i = 0; i < 10; i++) {
            const by = WATERLINE + 15 + i * H * 0.04,
              amp = 3 + i * 0.8 + Math.sin(t * 0.5 + i) * 2,
              freq = 0.01 - i * 0.0003,
              speed = t * (0.8 + i * 0.1);
            ctx.strokeStyle = `rgba(255,255,255,${0.08 - i * 0.007})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x <= W; x += 3) {
              const y =
                by +
                Math.sin(x * freq + speed) * amp +
                Math.sin(x * freq * 2.1 - speed * 0.6) * (amp * 0.35);
              x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          const glint = ctx.createRadialGradient(
            W * 0.2,
            WATERLINE,
            0,
            W * 0.2,
            WATERLINE + H * 0.15,
            W * 0.3,
          );
          glint.addColorStop(0, "rgba(255,220,140,0.1)");
          glint.addColorStop(1, "transparent");
          ctx.fillStyle = glint;
          ctx.fillRect(0, WATERLINE, HULL_LEFT, H - WATERLINE);
        }
        function drawHull() {
          ctx.fillStyle = "#180c04";
          ctx.fillRect(HULL_LEFT, 0, W - HULL_LEFT, WATERLINE + bobOffset);
          const sg2 = ctx.createLinearGradient(
            0,
            WATERLINE + bobOffset,
            0,
            WATERLINE + bobOffset + H * 0.18,
          );
          sg2.addColorStop(0, "rgba(30,14,4,0.6)");
          sg2.addColorStop(1, "rgba(10,5,0,0.2)");
          ctx.fillStyle = sg2;
          ctx.fillRect(
            HULL_LEFT * 1.05,
            WATERLINE + bobOffset,
            W - HULL_LEFT,
            H * 0.18,
          );
          const plankH = WATERLINE / 12;
          for (let i = 1; i < 12; i++) {
            ctx.strokeStyle = "rgba(8,4,1,0.45)";
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(HULL_LEFT, plankH * i);
            ctx.lineTo(W, plankH * i);
            ctx.stroke();
          }
          [WATERLINE * 0.55, WATERLINE * 0.6].forEach((y) => {
            const ig = ctx.createLinearGradient(HULL_LEFT, 0, W, 0);
            ig.addColorStop(0, "rgba(200,155,60,0.6)");
            ig.addColorStop(0.5, "rgba(240,200,90,0.95)");
            ig.addColorStop(1, "rgba(200,155,60,0.6)");
            ctx.strokeStyle = ig;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(HULL_LEFT, y);
            ctx.lineTo(W, y);
            ctx.stroke();
          });
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(HULL_LEFT, WATERLINE + bobOffset);
          ctx.lineTo(W, WATERLINE + bobOffset);
          ctx.stroke();
          const nx = W * 0.64,
            ny = WATERLINE * 0.69;
          ctx.save();
          ctx.font = `italic ${Math.round(H * 0.037)}px 'Cormorant Garamond', serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const tHalfW = W * 0.1;
          ctx.fillStyle = "rgba(160,90,220,0.7)";
          ctx.beginPath();
          ctx.arc(nx + tHalfW + 7, ny, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(150,80,210,0.5)";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(Math.max(nx - tHalfW, HULL_LEFT + 5), ny + H * 0.028);
          ctx.lineTo(Math.min(nx + tHalfW, W - 10), ny + H * 0.028);
          ctx.stroke();
          ctx.fillStyle = "rgba(50,25,0,0.85)";
          ctx.fillText("SERENDIPITY", nx + 2, ny + 2);
          const ng = ctx.createLinearGradient(nx - 80, ny, nx + 80, ny);
          ng.addColorStop(0, "rgba(170,120,35,0.9)");
          ng.addColorStop(0.5, "rgba(255,215,100,1)");
          ng.addColorStop(1, "rgba(170,120,35,0.9)");
          ctx.fillStyle = ng;
          ctx.fillText("SERENDIPITY", nx, ny);
          ctx.restore();
          const es = ctx.createLinearGradient(HULL_LEFT, 0, HULL_LEFT + 40, 0);
          es.addColorStop(0, "rgba(0,0,0,0.4)");
          es.addColorStop(1, "transparent");
          ctx.fillStyle = es;
          ctx.fillRect(HULL_LEFT, 0, 40, WATERLINE);
          ctx.strokeStyle = "rgba(0,0,0,0.5)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(HULL_LEFT, 0);
          ctx.lineTo(HULL_LEFT, WATERLINE);
          ctx.stroke();
        }
        function drawPorthole() {
          const px = W * 0.9; // horizontal — distance from left edge of screen
          const py = WATERLINE * 0.27; // vertical — distance from top, as fraction of waterline height
          const r = H * 0.087; // radius — controls size of the whole porthole

          // Outer brass ring
          ctx.beginPath();
          ctx.arc(px, py, r + 5, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(200, 155, 60, 0.9)";
          ctx.lineWidth = 4;
          ctx.stroke();

          // Glass — dark interior
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(8, 18, 28, 0.85)";
          ctx.fill();

          // Warm light inside cabin
          const cl2 = ctx.createRadialGradient(px, py + r * 0.5, 0, px, py, r);
          cl2.addColorStop(0, "rgba(255, 200, 120, 0.15)");
          cl2.addColorStop(1, "transparent");
          ctx.fillStyle = cl2;
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fill();

          // Clip figures to inside the porthole
          ctx.save();
          ctx.beginPath();
          ctx.arc(px, py, r - 2, 0, Math.PI * 2);
          ctx.clip();

          // Figure 1 — left
          drawPortholeF(px - r * 0.38, py, r, 1); // left figure tilts right
          // Figure 2 — right
          drawPortholeF(px + r * 0.38, py, r, -1); // right figure tilts left

          ctx.restore();

          // Glass glare
          ctx.beginPath();
          ctx.arc(px - r * 0.5, py - r * 0.37, r * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255, 255, 255, 0.057)";
          ctx.fill();

          // Inner ring shadow
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(0,0,0,0.4)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        function drawPortholeF(fx, fy, r, tiltDir) {
          const headR = r * 0.28;
          const headY = fy + r * 0.15;

          ctx.save();
          ctx.translate(fx, headY);
          ctx.rotate(tiltDir * 0.15); // slight tilt toward center

          // Head
          ctx.fillStyle = "rgba(195, 145, 90, 0.95)";
          ctx.beginPath();
          ctx.arc(0, 0, headR, 0, Math.PI * 2);
          ctx.fill();

          // Chest — just a hint below the head, clipped by porthole
          ctx.fillStyle = "rgba(180, 130, 78, 0.85)"; // chest
          ctx.beginPath();
          ctx.ellipse(
            0,
            headR * 1.95,
            headR * 1.4,
            headR * 0.9,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          ctx.restore();
        }

        scheduleRAF(() => {
          t += 0.04;
          sceneTimer++;
          bobOffset = Math.sin(t * 0.8) * 3;
          if (sceneTimer >= 720) {
            goToScene("serendipityView");
            return;
          }
          ctx.clearRect(0, 0, W, H);
          drawSky();
          drawWater();
          drawHull();
          drawPorthole();
          drawVignette(0.15);
        });
        return {};
      };

      // ---- 11. SERENDIPITY VIEW (on deck, looking out) ----
      SCENES.serendipityView = function () {
        let t = 0,
          sceneTimer = 0;
        const whaleImg = new Image();
        whaleImg.src = "assets/icons/whale.svg";

        const onAudioEnd = () => goToScene("epilogue");
        audio.addEventListener("ended", onAudioEnd);

        function draw() {
          ctx.clearRect(0, 0, W, H);
          const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
          sky.addColorStop(0, "#2e5a7a");
          sky.addColorStop(0.6, "#4a7a9a");
          sky.addColorStop(1, "#6a9ab8");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, W, H * 0.55);
          const sg = ctx.createRadialGradient(
            W * 0.62,
            H * 0.38,
            0,
            W * 0.62,
            H * 0.38,
            W * 0.35,
          );
          sg.addColorStop(0, "rgba(255,210,120,0.3)");
          sg.addColorStop(0.4, "rgba(255,180,80,0.09)");
          sg.addColorStop(1, "transparent");
          ctx.fillStyle = sg;
          ctx.fillRect(0, 0, W, H * 0.55);
          const water = ctx.createLinearGradient(0, H * 0.55, 0, H * 0.82);
          water.addColorStop(0, "#2a7a96");
          water.addColorStop(0.4, "#1a5a75");
          water.addColorStop(1, "#0e3a52");
          ctx.fillStyle = water;
          ctx.fillRect(0, H * 0.55, W, H * 0.27);
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, H * 0.55);
          ctx.lineTo(W, H * 0.55);
          ctx.stroke();
          for (let i = 0; i < 8; i++) {
            const by = H * 0.57 + i * H * 0.017,
              amp = 2 + i * 0.5,
              freq = 0.008 - i * 0.0005,
              spd = t * (0.8 + i * 0.1);
            ctx.strokeStyle = `rgba(255,255,255,${0.08 - i * 0.01})`;
            ctx.beginPath();
            for (let x = 0; x <= W; x += 4) {
              const y = by + Math.sin(x * freq + spd) * amp;
              x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          const railTop = H * 0.78;
          // serendipity rail — dark wood #180c04
          const wg = ctx.createLinearGradient(0, railTop, 0, H);
          wg.addColorStop(0, "#180c04");
          wg.addColorStop(0.3, "#180c04");
          wg.addColorStop(0.7, "#180c04");
          wg.addColorStop(1, "#180c04");
          ctx.fillStyle = wg;
          ctx.fillRect(0, railTop, W, H - railTop);
          const iY1 = railTop + 14,
            iY2 = railTop + 18;
          const ig = ctx.createLinearGradient(0, 0, W, 0);
          ig.addColorStop(0, "transparent");
          ig.addColorStop(0.1, "rgba(200,155,60,0.6)");
          ig.addColorStop(0.5, "rgba(230,185,80,0.9)");
          ig.addColorStop(0.9, "rgba(200,155,60,0.6)");
          ig.addColorStop(1, "transparent");
          ctx.fillStyle = ig;
          ctx.fillRect(0, iY1, W, 1.5);
          ctx.fillRect(0, iY2, W, 1.5);
          // tally marks
          const tx = W * 0.85,
            ty = railTop + 50,
            tH = 27,
            tG = 10;
          ctx.strokeStyle = "rgba(255,200,100,0.35)";
          ctx.lineWidth = 1.5;
          ctx.lineCap = "round";
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(tx + i * tG, ty);
            ctx.lineTo(tx + i * tG - 5, ty + tH);
            ctx.stroke();
          }
          ctx.strokeStyle = "rgba(0,0,0,0.07)";
          ctx.lineWidth = 0.5;
          for (let i = 0; i < 28; i++) {
            const x = (W / 28) * i + (Math.random() * 8 - 4);
            ctx.beginPath();
            ctx.moveTo(x, railTop);
            ctx.lineTo(x + (Math.random() - 0.5) * 6, H);
            ctx.stroke();
          }
          ctx.fillStyle = "#0e0e1a";
          ctx.fillRect(0, railTop, W, 8);
          ctx.fillStyle = "rgba(210,165,60,0.5)";
          ctx.fillRect(0, railTop, W, 2.5);
          ctx.fillStyle = "rgba(0,0,0,0.4)";
          ctx.fillRect(0, railTop + 8, W, 5);
          // whale image drawn in DOM overlay — but also draw on canvas
          if (whaleImg.complete) {
            const wW = Math.min(100, W * 0.08),
              aspect = whaleImg.naturalWidth / whaleImg.naturalHeight;
            const wH = wW / aspect;
            ctx.save();
            ctx.globalAlpha = 0.7;
            ctx.drawImage(whaleImg, W * 0.07, railTop + 30, wW, wH);
            ctx.restore();
          }
          const wl = ctx.createLinearGradient(0, railTop, W, railTop);
          wl.addColorStop(0, "transparent");
          wl.addColorStop(0.6, "rgba(255,200,120,0.06)");
          wl.addColorStop(1, "transparent");
          ctx.fillStyle = wl;
          ctx.fillRect(0, railTop, W, H - railTop);
          drawVignette(0.22);
        }

        scheduleRAF(() => {
          t += 0.04;
          sceneTimer++;
          draw();
        });
        return {
          destroy() {
            audio.removeEventListener("ended", onAudioEnd);
          },
        };
      };

      // ---- 12. EPILOGUE (museum with new light, Like Animals playing) ----
      SCENES.epilogue = function () {
        const particles = makeParticles(80);
        // Switch to Like Animals
        audioPlay("ARIRANG/LikeAnimals.mp3", 0);

        const cases = [
          { cx: W * 0.19, depth: 0.75, item: "ship" },
          { cx: W * 0.42, depth: 0.65, item: "book" },
          { cx: W * 0.72, depth: 0.88, item: "ship" },
        ].map((c) => ({ ...c, cy: FLOOR_Y - (BASE_H * c.depth) / 2 }));

        function drawEpilogueCase(c) {
          const w = BASE_W * c.depth,
            h = BASE_H * c.depth,
            left = c.cx - w / 2,
            top = c.cy - h / 2;
          ctx.save();
          ctx.globalAlpha = 1 * (1 + c.depth * 0.5);
          const glow = ctx.createRadialGradient(
            c.cx,
            c.cy,
            0,
            c.cx,
            c.cy,
            w * 1.3,
          );
          glow.addColorStop(0, "rgba(255,210,130,0.06)");
          glow.addColorStop(1, "transparent");
          ctx.fillStyle = glow;
          ctx.fillRect(left - 40, top - 40, w + 80, h + 80);
          const sheen = ctx.createLinearGradient(left, top, left + w, top);
          sheen.addColorStop(0, "rgba(255,255,255,0.01)");
          sheen.addColorStop(0.3, "rgba(255,255,255,0.04)");
          sheen.addColorStop(1, "rgba(255,255,255,0.01)");
          ctx.fillStyle = sheen;
          ctx.fillRect(left, top, w, h);
          ctx.strokeStyle = "rgba(255,210,130,0.15)";
          ctx.lineWidth = 1;
          ctx.strokeRect(left, top, w, h);
          ctx.strokeStyle = "rgba(255,220,160,0.25)";
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(left, top);
          ctx.lineTo(left + w, top);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,200,100,0.05)";
          ctx.fillRect(left - 5, top + h, w + 10, 7 * c.depth);
          ctx.strokeStyle = "rgba(255,210,130,0.12)";
          ctx.lineWidth = 0.5;
          ctx.strokeRect(left - 5, top + h, w + 10, 7 * c.depth);
          if (c.item === "ship") drawShip(c.cx, top + h * 0.72, w * 0.68);
          else drawBook(c.cx, top + h * 0.22, w * 0.42, h * 0.50);
          ctx.restore();
        }

        function draw() {
          ctx.clearRect(0, 0, W, H);
          drawMuseumBackground();
          const cl = ctx.createRadialGradient(
            W * 0.7,
            -100,
            0,
            W * 0.7,
            -100,
            H * 0.9,
          );
          cl.addColorStop(0, "rgba(255,210,130,0.45)");
          cl.addColorStop(1, "transparent");
          ctx.fillStyle = cl;
          ctx.fillRect(0, 0, W, H);
          drawMuseumFloor();
          cases.forEach((c) => drawEpilogueCase(c));
          drawMuseumFigures(0.15);
          tickParticles(particles);
          drawParticles(particles);
          drawVignette(0.7);
        }

        setCanvasClick(() => goToScene("player"));
        scheduleRAF(() => {
          ctx.clearRect(0, 0, W, H);
          draw();
        });
        return {};
      };

      // ---- 13. PLAYER (vinyl + tracklist) ----
      SCENES.player = function () {
        let t = 0,
          spinAngle = 0,
          currentTrack = -1;
        const particles = makeParticles(60);
        const tracks = [
          { title: "Body to Body", file: "ARIRANG/BodytoBody.mp3" },
          { title: "Hooligan", file: "ARIRANG/Hooligan.mp3" },
          { title: "Aliens", file: "ARIRANG/Aliens.mp3" },
          { title: "FYA", file: "ARIRANG/FYA.mp3" },
          { title: "2.0", file: "ARIRANG/2.mp3" },
          { title: "No. 29", file: "ARIRANG/No29.mp3" },
          { title: "SWIM", file: "ARIRANG/SWIM.mp3" },
          { title: "Merry Go Round", file: "ARIRANG/MerryGoRound.mp3" },
          { title: "NORMAL", file: "ARIRANG/NORMAL.mp3" },
          { title: "Like Animals", file: "ARIRANG/LikeAnimals.mp3" },
          {
            title: "they don't know 'bout us",
            file: "ARIRANG/theydontknowboutus.mp3",
          },
          { title: "One More Night", file: "ARIRANG/OneMoreNight.mp3" },
          { title: "Please", file: "ARIRANG/Please.mp3" },
          { title: "Into the Sun", file: "ARIRANG/IntotheSun.mp3" },
        ];

        const recordR = Math.min(W, H) * (isMobile ? 0.3 : 0.32);
        const cx2 = W / 2,
          cy2 = isMobile ? H * 0.38 : H * 0.46;
        const pivotR2 = Math.max(10, recordR * 0.056);
        let vinyl_pauseBtn2 = null;

        function playTrack(idx, startTime = 0) {
          currentTrack = idx;
          audioPlay(tracks[idx].file, startTime);
          updateHighlight();
        }

        // Start Like Animals (came from epilogue, already playing) — detect and continue
        const savedSrc = audio.src;
        if (savedSrc && savedSrc.includes("LikeAnimals")) {
          // already playing, just sync
          currentTrack = 9;
          updateHighlight();
        } else {
          playTrack(9, 0);
        }

        const onAudioEnd = () => playTrack((currentTrack + 1) % tracks.length);
        audio.addEventListener("ended", onAudioEnd);

        function updateHighlight() {
          document.querySelectorAll(".track-item").forEach((el) => {
            const i = parseInt(el.dataset.index);
            el.style.color =
              i === currentTrack ? "rgba(140,90,20,1)" : "rgba(70,42,12,0.7)";
            el.style.fontWeight = i === currentTrack ? "bold" : "normal";
          });
        }

        function drawBase() {
          const bw = recordR * 2.6,
            bh = recordR * 2.2,
            bx = cx2 - bw / 2,
            by = cy2 - bh * 0.5;
          ctx.fillStyle = "rgba(0,0,0,0.4)";
          ctx.beginPath();
          ctx.roundRect(bx + 8, by + 8, bw, bh, 12);
          ctx.fill();
          const bg2 = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
          bg2.addColorStop(0, "#1a0e04");
          bg2.addColorStop(0.4, "#2a1508");
          bg2.addColorStop(1, "#120a02");
          ctx.fillStyle = bg2;
          ctx.beginPath();
          ctx.roundRect(bx, by, bw, bh, 12);
          ctx.fill();
          ctx.strokeStyle = "rgba(200,155,60,0.5)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.roundRect(bx, by, bw, bh, 12);
          ctx.stroke();
          ctx.strokeStyle = "rgba(200,155,60,0.25)";
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.roundRect(bx + 8, by + 8, bw - 16, bh - 16, 8);
          ctx.stroke();
        }
        function drawRecord() {
          ctx.beginPath();
          ctx.arc(cx2, cy2, recordR, 0, Math.PI * 2);
          ctx.fillStyle = "#0a0806";
          ctx.fill();
          for (
            let r = recordR * 0.35;
            r < recordR * 0.96;
            r += recordR * 0.045
          ) {
            ctx.beginPath();
            ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
          const sh = ctx.createRadialGradient(
            cx2 - recordR * 0.3,
            cy2 - recordR * 0.3,
            0,
            cx2,
            cy2,
            recordR,
          );
          sh.addColorStop(0, "rgba(255,255,255,0.06)");
          sh.addColorStop(0.5, "transparent");
          ctx.fillStyle = sh;
          ctx.beginPath();
          ctx.arc(cx2, cy2, recordR, 0, Math.PI * 2);
          ctx.fill();
          const labelR = recordR * 0.28;
          const lg2 = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, labelR);
          lg2.addColorStop(0, "#c8a050");
          lg2.addColorStop(0.6, "#b08030");
          lg2.addColorStop(1, "#8a6020");
          ctx.fillStyle = lg2;
          ctx.beginPath();
          ctx.arc(cx2, cy2, labelR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(30,15,3,0.85)";
          ctx.font = `italic bold ${Math.round(recordR * 0.1)}px Georgia,serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("ARIRANG", cx2, cy2 - recordR * 0.05);
          if (currentTrack >= 0) {
            ctx.font = `italic ${Math.round(recordR * 0.065)}px Georgia,serif`;
            ctx.fillStyle = "rgba(30,15,3,0.65)";
            ctx.fillText(tracks[currentTrack].title, cx2, cy2 + recordR * 0.1);
          }
          ctx.beginPath();
          ctx.arc(cx2, cy2, recordR * 0.025, 0, Math.PI * 2);
          ctx.fillStyle = "#0a0806";
          ctx.fill();
          ctx.strokeStyle = "rgba(200,155,60,0.4)";
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
        function drawPauseBtn() {
          if (currentTrack === -1) return;
          const bx2 = cx2 + recordR * 1.1,
            by2 = cy2 + recordR * 0.9,
            br = isMobile ? 16 : 22;
          ctx.beginPath();
          ctx.arc(bx2, by2, br, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(200,155,60,0.15)";
          ctx.fill();
          ctx.strokeStyle = "rgba(200,155,60,0.55)";
          ctx.lineWidth = 1;
          ctx.stroke();
          const s = br / 22;
          ctx.fillStyle = "rgba(200,155,60,0.85)";
          if (audio.paused) {
            ctx.beginPath();
            ctx.moveTo(bx2 - 7 * s, by2 - 9 * s);
            ctx.lineTo(bx2 + 11 * s, by2);
            ctx.lineTo(bx2 - 7 * s, by2 + 9 * s);
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.fillRect(bx2 - 8 * s, by2 - 8 * s, 5 * s, 16 * s);
            ctx.fillRect(bx2 + 3 * s, by2 - 8 * s, 5 * s, 16 * s);
          }
          vinyl_pauseBtn2 = { x: bx2, y: by2, r: br };
        }
        function drawArm() {
          const pvX = cx2 + recordR * 1.05,
            pvY = cy2 - recordR * 0.85,
            armAngle = Math.PI * 0.82,
            armLen = recordR * 1.15;
          const tipX = pvX + Math.cos(armAngle) * armLen,
            tipY = pvY + Math.sin(armAngle) * armLen;
          const pg = ctx.createRadialGradient(pvX, pvY, 0, pvX, pvY, pivotR2);
          pg.addColorStop(0, "#c8a050");
          pg.addColorStop(1, "#8a6020");
          ctx.fillStyle = pg;
          ctx.beginPath();
          ctx.arc(pvX, pvY, pivotR2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(200,155,60,0.5)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.strokeStyle = "rgba(200,165,70,0.9)";
          ctx.lineWidth = Math.max(2, recordR * 0.012);
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(pvX, pvY);
          ctx.lineTo(tipX, tipY);
          ctx.stroke();
          ctx.strokeStyle = "rgba(255,220,120,0.3)";
          ctx.lineWidth = Math.max(1, recordR * 0.006);
          ctx.beginPath();
          ctx.moveTo(pvX, pvY);
          ctx.lineTo(tipX, tipY);
          ctx.stroke();
          ctx.fillStyle = "rgba(180,140,50,0.9)";
          ctx.beginPath();
          ctx.arc(tipX, tipY, Math.max(3, recordR * 0.016), 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#0a0806";
          ctx.beginPath();
          ctx.arc(pvX, pvY, pivotR2 * 0.3, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawHint() {
          ctx.fillStyle = `rgba(200,155,60,${0.2 + Math.sin(t * 0.8) * 0.1})`;
          ctx.font = `italic ${Math.round(H * 0.018)}px Georgia,serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const hy = isMobile ? cy2 + recordR * 1.7 : cy2 + recordR * 1.35;
          ctx.fillText(
            isMobile ? "tap to browse tracks" : "click to browse tracks",
            cx2,
            hy,
          );
        }
        function drawPlayerBg() {
          drawMuseumBackground();
          const light = ctx.createRadialGradient(
            W / 2,
            -100,
            0,
            W / 2,
            -100,
            H * 0.9,
          );
          light.addColorStop(0, "rgba(255,210,130,0.07)");
          light.addColorStop(1, "transparent");
          ctx.fillStyle = light;
          ctx.fillRect(0, 0, W, H);
          tickParticles(particles);
          drawParticles(particles);
          ctx.fillStyle = "#14100a";
          ctx.fillRect(0, H * 0.85, W, H * 0.15);
          ctx.strokeStyle = "rgba(255,200,100,0.04)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, H * 0.85);
          ctx.lineTo(W, H * 0.85);
          ctx.stroke();
          drawVignette(0.88);
        }

        const bookOverlay2 = document.getElementById("book-overlay");
        const pLeft = document.getElementById("puzzle-left");
        const pRight = document.getElementById("puzzle-right");
        // Clear from swim
        pLeft.innerHTML = '<div id="tracklist-title"></div>';
        pRight.innerHTML = '<div id="tracklist"></div>';

        function buildTracklist() {
          if (isMobile) buildMobile();
          else buildDesktop();
        }
        function buildDesktop() {
          const half = Math.ceil(tracks.length / 2);
          const lt = tracks.slice(0, half),
            rt = tracks.slice(half);
          function makeItems(list, offset) {
            return list
              .map((tr, i) => {
                const idx = i + offset;
                return `<div class="track-item" data-index="${idx}" style="font-family:Georgia,serif;font-style:italic;font-size:1.05rem;color:rgba(70,42,12,0.7);border-bottom:1px solid rgba(160,120,50,0.12);cursor:pointer;transition:color 0.2s;letter-spacing:0.03em;width:100%;flex:1;display:flex;align-items:center;">${tr.title}</div>`;
              })
              .join("");
          }
          pLeft.style.cssText =
            "width:85%;height:85%;display:flex;flex-direction:column;align-items:stretch;";
          pLeft.innerHTML = `<div style="font-family:Georgia,serif;font-style:italic;font-weight:bold;font-size:1.5rem;color:rgba(70,42,12,0.75);text-align:center;letter-spacing:0.08em;padding-bottom:10px;border-bottom:1px solid rgba(160,120,50,0.2);margin-bottom:8px;flex-shrink:0;">ARIRANG</div><div style="flex:1;display:flex;flex-direction:column;">${makeItems(lt, 0)}</div>`;
          pRight.style.cssText =
            "width:85%;height:85%;display:flex;flex-direction:column;align-items:stretch;position:relative;";
          pRight.innerHTML = `<button id="overlay-close" style="position:absolute;top:0;right:0;background:transparent;border:1px solid rgba(160,120,50,0.4);color:rgba(100,65,20,0.7);font-family:Georgia,serif;font-size:1.1rem;width:28px;height:28px;cursor:pointer;border-radius:2px;line-height:1;">✕</button><div style="flex:1;display:flex;flex-direction:column;padding-top:8px;">${makeItems(rt, half)}</div>`;
          attachEvents();
        }
        function buildMobile() {
          pLeft.style.cssText = "display:none;";
          pRight.style.cssText =
            "width:88%;height:88%;display:flex;flex-direction:column;align-items:stretch;position:relative;";
          pRight.innerHTML = `<div style="width:36px;height:4px;background:rgba(160,120,50,0.3);border-radius:2px;margin:0 auto 14px auto;flex-shrink:0;"></div><div style="font-family:Georgia,serif;font-style:italic;font-weight:bold;font-size:1.2rem;color:rgba(70,42,12,0.75);text-align:center;letter-spacing:0.08em;padding-bottom:10px;border-bottom:1px solid rgba(160,120,50,0.2);margin-bottom:8px;flex-shrink:0;">ARIRANG</div><button id="overlay-close" style="position:absolute;top:20px;right:0;background:transparent;border:1px solid rgba(160,120,50,0.35);color:rgba(100,65,20,0.7);font-family:Georgia,serif;font-size:1.1rem;width:36px;height:36px;cursor:pointer;border-radius:2px;line-height:1;">✕</button><div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;">${tracks.map((tr, i) => `<div class="track-item" data-index="${i}" style="font-family:Georgia,serif;font-style:italic;font-size:1rem;color:rgba(70,42,12,0.7);border-bottom:1px solid rgba(160,120,50,0.12);cursor:pointer;letter-spacing:0.03em;padding:12px 0;display:flex;align-items:center;">${tr.title}</div>`).join("")}</div>`;
          attachEvents();
        }
        function attachEvents() {
          document.querySelectorAll(".track-item").forEach((el) => {
            el.addEventListener(
              "mouseenter",
              () => (el.style.color = "rgba(100,60,10,0.95)"),
            );
            el.addEventListener("mouseleave", () => {
              if (parseInt(el.dataset.index) !== currentTrack)
                el.style.color = "rgba(70,42,12,0.7)";
            });
            el.addEventListener("click", () => {
              playTrack(parseInt(el.dataset.index));
              bookOverlay2.classList.remove("open");
            });
          });
          document
            .getElementById("overlay-close")
            .addEventListener("click", () =>
              bookOverlay2.classList.remove("open"),
            );
          updateHighlight();
        }
        bookOverlay2.addEventListener("click", function (e) {
          if (e.target === this) this.classList.remove("open");
        });

        function handleInteraction(cx3, cy3) {
          if (vinyl_pauseBtn2) {
            const dx = cx3 - vinyl_pauseBtn2.x,
              dy = cy3 - vinyl_pauseBtn2.y;
            if (Math.sqrt(dx * dx + dy * dy) < vinyl_pauseBtn2.r) {
              audio.paused ? audio.play() : audio.pause();
              return;
            }
          }
          const dx = cx3 - cx2,
            dy = cy3 - cy2;
          if (Math.sqrt(dx * dx + dy * dy) < recordR)
            bookOverlay2.classList.add("open");
        }
        setCanvasClick((e) => handleInteraction(e.clientX, e.clientY));

        buildTracklist();

        scheduleRAF(() => {
          t += 0.04;
          if (!audio.paused) spinAngle += 0.012;
          ctx.clearRect(0, 0, W, H);
          drawPlayerBg();
          drawBase();
          ctx.save();
          ctx.translate(cx2, cy2);
          ctx.rotate(spinAngle);
          ctx.translate(-cx2, -cy2);
          drawRecord();
          ctx.restore();
          drawArm();
          drawPauseBtn();
          drawHint();
        });

        return {
          destroy() {
            audio.removeEventListener("ended", onAudioEnd);
          },
        };
      };

      // ============================================================
      //  START
      // ============================================================
      // Body starts visible, welcome scene handles its own timing
      document.body.style.opacity = 1;
      goToSceneImmediate("welcome");
    </script>
  </body>
</html>
