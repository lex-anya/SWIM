<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWIM</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/purpleHeart.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0805;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
      }

      /* ---- BOOK OVERLAY ---- */
      #book-overlay {
        display: none;
        scrollbar-width: none;
        -ms-overflow-style: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #book-overlay *::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      #book-overlay.open {
        display: flex;
      }
      #book {
        overflow: hidden;
        display: flex;
        width: 72vw;
        height: 72vh;
        position: relative;
        filter: drop-shadow(0 8px 40px rgba(0, 0, 0, 0.7));
      }
      .book-page {
        flex: 1;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #book-left {
        background:
          radial-gradient(
            ellipse at 20% 30%,
            rgba(200, 170, 110, 0.15) 0%,
            transparent 60%
          ),
          linear-gradient(135deg, #efe4c8 0%, #e8d9b8 40%, #f2e6cc 100%);
        border-radius: 4px 0 0 4px;
        border: 1px solid rgba(160, 120, 60, 0.3);
        border-right: none;
      }
      #book-right {
        background:
          radial-gradient(
            ellipse at 80% 30%,
            rgba(200, 170, 110, 0.15) 0%,
            transparent 60%
          ),
          linear-gradient(225deg, #efe4c8 0%, #e8d9b8 40%, #f2e6cc 100%);
        border-radius: 0 4px 4px 0;
        border: 1px solid rgba(160, 120, 60, 0.3);
        border-left: none;
      }
      #book-spine {
        width: clamp(16px, 2vw, 32px);
        background: linear-gradient(
          to right,
          #c8a870 0%,
          #e8c888 30%,
          #d4a850 60%,
          #b89040 100%
        );
        flex-shrink: 0;
        box-shadow:
          inset -3px 0 6px rgba(0, 0, 0, 0.2),
          inset 3px 0 6px rgba(255, 220, 150, 0.3);
      }
      #puzzle-left,
      #puzzle-right {
        scrollbar-width: none;
        -ms-overflow-style: none;
        width: 85%;
        height: 85%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #puzzle-left::-webkit-scrollbar,
      #puzzle-right::-webkit-scrollbar {
        display: none;
      }
      #tracklist {
        width: 100%;
        overflow-y: auto;
        max-height: 100%;
      }
      #puzzle-right {
        overflow-y: auto;
        align-items: flex-start;
        justify-content: flex-start;
        flex-direction: column;
        padding-top: 10px;
      }
      #puzzle-left {
        align-items: center;
        justify-content: center;
      }

      /* whale overlay */
      #whale {
        position: absolute;
      }
      #whale img {
        display: block;
      }

      @media (max-width: 768px) {
        #book-overlay {
          align-items: flex-end;
          justify-content: center;
        }
        #book {
          width: 100vw;
          height: 72vh;
          border-radius: 16px 16px 0 0;
          overflow: hidden;
          filter: none;
        }
        #book-left,
        #book-spine {
          display: none;
        }
        #book-right {
          flex: 1;
          border-radius: 16px 16px 0 0;
          border: none;
          border-top: 1px solid rgba(160, 120, 60, 0.25);
          background:
            radial-gradient(
              ellipse at 50% 10%,
              rgba(200, 170, 110, 0.12) 0%,
              transparent 60%
            ),
            linear-gradient(180deg, #efe4c8 0%, #e8d9b8 60%, #f2e6cc 100%);
        }
        #puzzle-left {
          display: none;
        }
        #puzzle-right {
          width: 88%;
          height: 88%;
          padding-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Book overlay (used by swim scene + player scene) -->
    <div id="book-overlay">
      <div id="book">
        <div id="book-left" class="book-page">
          <div id="puzzle-left">
            <div id="tracklist-title"></div>
          </div>
        </div>
        <div id="book-spine"></div>
        <div id="book-right" class="book-page">
          <div id="puzzle-right">
            <div id="tracklist"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Single shared audio element -->
    <audio id="bg-audio"></audio>

    <script>
      // ============================================================
      //  SWIM — Single Page App
      //  One canvas, one audio element, scene-based rendering
      // ============================================================

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      let audio = document.getElementById("bg-audio");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      let W = canvas.width;
      let H = canvas.height;

      // ---- Scene manager ----
      let currentScene = null;
      let currentRAF = -1; // -1 = no active RAF; scheduleRAF checks identity

      function _teardown() {
        if (currentScene && currentScene.destroy) currentScene.destroy();
        currentScene = null;
        currentRAF = -1;
        clearCanvasClick();
      }

      function goToScene(name, duration = 700, ...args) {
        _teardown();
        document.body.style.transition = `opacity ${duration / 1000}s ease`;
        document.body.style.opacity = 0;
        setTimeout(() => {
          ctx.clearRect(0, 0, W, H);
          currentScene = SCENES[name](...args);
          document.body.style.transition = `opacity ${duration / 1000}s ease`;
          document.body.style.opacity = 1;
        }, duration);
      }

      // No-fade version for the very first scene load
      function goToSceneImmediate(name, ...args) {
        _teardown();
        ctx.clearRect(0, 0, W, H);
        currentScene = SCENES[name](...args);
      }

      function scheduleRAF(fn) {
        let myId = null;
        function loop() {
          // If currentRAF no longer matches our id, we've been cancelled — stop
          if (currentRAF !== myId) return;
          fn();
          // fn() may have called goToScene() which changes currentRAF — check again
          if (currentRAF !== myId) return;
          myId = requestAnimationFrame(loop);
          currentRAF = myId;
        }
        myId = requestAnimationFrame(loop);
        currentRAF = myId;
      }

      // ---- Shared audio helpers ----

      // One AudioContext for the whole app, created on the first user gesture (doors click).
      // createMediaElementSource is called once here — audio routes through this graph forever.
      // The swim scene's humming puzzle just reads from appAnalyser without touching the graph.
      let appAudioCtx = null;
      let appAnalyser = null;
      let appAnalyserData = null;
      let appAudioSourceCreated = false;

      function audioPlay(src, time) {
        if (src && audio.src !== new URL(src, location.href).href) {
          audio.src = src;
        }
        if (time !== undefined) audio.currentTime = time;
        audio.volume = 1;
        audio.play().catch(() => {});
      }

      function audioCrossfadeTo(src, time, duration) {
        // Fade out current, switch, fade in — duration in ms
        const startVol = audio.volume;
        const step = startVol / (duration / 50);
        const fade = setInterval(() => {
          audio.volume = Math.max(0, audio.volume - step);
          if (audio.volume <= 0) {
            clearInterval(fade);
            audioPlay(src, time);
            fadeInAudio(duration);
          }
        }, 50);
      }

      function fadeInAudio(duration) {
        audio.volume = 0;
        const step = 1 / (duration / 50);
        const fade = setInterval(() => {
          audio.volume = Math.min(1, audio.volume + step);
          if (audio.volume >= 1) clearInterval(fade);
        }, 50);
      }

      function fadeOutAudio(duration, cb) {
        const step = audio.volume / (duration / 50);
        const fade = setInterval(() => {
          audio.volume = Math.max(0, audio.volume - step);
          if (audio.volume <= 0) {
            clearInterval(fade);
            if (cb) cb();
          }
        }, 50);
      }

      // ---- Shared canvas click handler (scene-local) ----
      // Each scene registers its own handler; we keep a reference so we can remove it
      let _canvasClickHandler = null;
      function setCanvasClick(fn) {
        if (_canvasClickHandler)
          canvas.removeEventListener("click", _canvasClickHandler);
        if (_canvasClickHandler)
          canvas.removeEventListener("touchend", _canvasTouchHandler);
        _canvasClickHandler = fn;
        _canvasTouchHandler = fn
          ? (e) => {
              e.preventDefault();
              const t = e.changedTouches[0];
              fn({ clientX: t.clientX, clientY: t.clientY });
            }
          : null;
        if (fn) {
          canvas.addEventListener("click", _canvasClickHandler);
          canvas.addEventListener("touchend", _canvasTouchHandler, {
            passive: false,
          });
        }
      }
      let _canvasTouchHandler = null;
      function clearCanvasClick() {
        setCanvasClick(null);
      }

      // ---- isMobile ----
      const isMobile = window.innerWidth < 768;

      // ============================================================
      //  SHARED DRAW HELPERS (used across multiple scenes)
      // ============================================================

      function makeParticles(count) {
        return Array.from({ length: count }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          size: Math.random() * 1.5 + 0.3,
          speedX: (Math.random() - 0.5) * 0.15,
          speedY: (Math.random() - 0.5) * 0.08,
          opacity: Math.random() * 0.45 + 0.15,
        }));
      }

      function tickParticles(particles) {
        particles.forEach((p) => {
          p.x += p.speedX;
          p.y += p.speedY;
          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;
        });
      }

      function drawParticles(particles, opacityMul) {
        particles.forEach((p) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 220, 150, ${p.opacity * (opacityMul !== undefined ? opacityMul : 1)})`;
          ctx.fill();
        });
      }

      function drawMuseumBackground() {
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#0e0b07");
        bg.addColorStop(0.5, "#0a0805");
        bg.addColorStop(1, "#060503");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
      }

      function drawMuseumFloor() {
        ctx.fillStyle = "#14100a";
        ctx.fillRect(0, H * 0.78, W, H * 0.22);
        const fg = ctx.createLinearGradient(0, H * 0.78, 0, H);
        fg.addColorStop(0, "rgba(255,200,100,0.03)");
        fg.addColorStop(1, "transparent");
        ctx.fillStyle = fg;
        ctx.fillRect(0, H * 0.78, W, H * 0.22);
        ctx.strokeStyle = "rgba(255,200,100,0.04)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, H * 0.78);
        ctx.lineTo(W, H * 0.78);
        ctx.stroke();
      }

      function drawVignette(alpha) {
        const v = ctx.createRadialGradient(
          W / 2,
          H / 2,
          H * 0.1,
          W / 2,
          H / 2,
          H * 0.85,
        );
        v.addColorStop(0, "transparent");
        v.addColorStop(1, `rgba(0,0,0,${alpha !== undefined ? alpha : 0.7})`);
        ctx.fillStyle = v;
        ctx.fillRect(0, 0, W, H);
      }

      function drawShip(cx, baseY, shipW) {
        const shipX = cx - shipW / 2;
        const s = shipW / 60;
        ctx.strokeStyle = "rgba(255, 200, 120, 0.35)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(shipX + shipW * 0.1, baseY);
        ctx.lineTo(shipX + shipW * 0.9, baseY);
        ctx.quadraticCurveTo(
          shipX + shipW + 5,
          baseY + 8 * s,
          shipX + shipW * 0.75,
          baseY + 16 * s,
        );
        ctx.lineTo(shipX + shipW * 0.25, baseY + 16 * s);
        ctx.quadraticCurveTo(
          shipX - 5,
          baseY + 8 * s,
          shipX + shipW * 0.1,
          baseY,
        );
        ctx.fillStyle = "rgba(255, 180, 80, 0.06)";
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 200, 120, 0.2)";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(shipX + shipW * 0.15, baseY + 4 * s);
        ctx.lineTo(shipX + shipW * 0.85, baseY + 4 * s);
        ctx.stroke();
        const mH = 38 * s,
          fH = 26 * s;
        ctx.strokeStyle = "rgba(255, 200, 120, 0.4)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(cx - shipW * 0.05, baseY);
        ctx.lineTo(cx - shipW * 0.05, baseY - mH);
        ctx.stroke();
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(cx + shipW * 0.22, baseY);
        ctx.lineTo(cx + shipW * 0.22, baseY - fH);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,210,140,0.3)";
        ctx.fillStyle = "rgba(255,200,120,0.07)";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(cx - shipW * 0.05, baseY - mH);
        ctx.quadraticCurveTo(
          cx - shipW * 0.28,
          baseY - mH * 0.6,
          cx - shipW * 0.05,
          baseY - 8 * s,
        );
        ctx.lineTo(cx - shipW * 0.05, baseY - mH);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - shipW * 0.05, baseY - mH);
        ctx.quadraticCurveTo(
          cx + shipW * 0.18,
          baseY - mH * 0.6,
          cx - shipW * 0.05,
          baseY - 8 * s,
        );
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + shipW * 0.22, baseY - fH);
        ctx.quadraticCurveTo(
          cx + shipW * 0.38,
          baseY - fH * 0.5,
          cx + shipW * 0.22,
          baseY - 4 * s,
        );
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,200,120,0.3)";
        ctx.lineWidth = 0.8;
        ctx.strokeRect(
          cx - shipW * 0.1,
          baseY - mH - 6 * s,
          shipW * 0.1,
          6 * s,
        );
        ctx.strokeStyle = "rgba(255,200,120,0.12)";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(cx - shipW * 0.05, baseY - mH);
        ctx.lineTo(shipX + shipW * 0.85, baseY + 2 * s);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - shipW * 0.05, baseY - mH);
        ctx.lineTo(cx + shipW * 0.22, baseY - fH);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,200,120,0.3)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(shipX + shipW * 0.85, baseY + 2 * s);
        ctx.lineTo(shipX + shipW + 12 * s, baseY - 10 * s);
        ctx.stroke();
      }

      function drawBook(cx, topY, bW, bH) {
        const bX = cx - bW / 2;
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(bX + 3, topY + 3, bW, bH);
        ctx.fillStyle = "rgba(180,120,50,0.12)";
        ctx.fillRect(bX, topY, bW, bH);
        ctx.fillStyle = "rgba(180,120,50,0.2)";
        ctx.fillRect(bX, topY, 6, bH);
        ctx.strokeStyle = "rgba(255,200,120,0.35)";
        ctx.lineWidth = 1;
        ctx.strokeRect(bX, topY, bW, bH);
        ctx.strokeStyle = "rgba(255,200,120,0.15)";
        ctx.lineWidth = 0.5;
        ctx.strokeRect(bX + 4, topY + 4, bW - 8, bH - 8);
        ctx.strokeStyle = "rgba(255,235,180,0.2)";
        ctx.lineWidth = 0.4;
        for (let i = 1; i <= 6; i++) {
          ctx.beginPath();
          ctx.moveTo(bX + bW, topY + (bH / 7) * i);
          ctx.lineTo(bX + bW + 2, topY + (bH / 7) * i);
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(255,200,120,0.2)";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(cx + 2, topY + bH * 0.4, 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,200,120,0.08)";
        for (let i = 1; i <= 4; i++) {
          ctx.beginPath();
          ctx.moveTo(bX + 10, topY + (bH / 5) * i);
          ctx.lineTo(bX + bW - 6, topY + (bH / 5) * i);
          ctx.stroke();
        }
      }

      const BASE_W = W * 0.12;
      const BASE_H = H * 0.26;
      const FLOOR_Y = H * 0.78;

      function drawMuseumCase(c, opacity) {
        const w = BASE_W * c.depth,
          h = BASE_H * c.depth;
        const left = c.cx - w / 2,
          top = c.cy - h / 2;
        ctx.save();
        ctx.globalAlpha = opacity * (0.5 + c.depth * 0.5);
        const glow = ctx.createRadialGradient(
          c.cx,
          c.cy,
          0,
          c.cx,
          c.cy,
          w * 1.3,
        );
        glow.addColorStop(0, "rgba(255,210,130,0.06)");
        glow.addColorStop(1, "transparent");
        ctx.fillStyle = glow;
        ctx.fillRect(left - 40, top - 40, w + 80, h + 80);
        const sheen = ctx.createLinearGradient(left, top, left + w, top);
        sheen.addColorStop(0, "rgba(255,255,255,0.01)");
        sheen.addColorStop(0.3, "rgba(255,255,255,0.04)");
        sheen.addColorStop(1, "rgba(255,255,255,0.01)");
        ctx.fillStyle = sheen;
        ctx.fillRect(left, top, w, h);
        ctx.strokeStyle = "rgba(255,210,130,0.15)";
        ctx.lineWidth = 1;
        ctx.strokeRect(left, top, w, h);
        ctx.strokeStyle = "rgba(255,220,160,0.25)";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(left + w, top);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,200,100,0.05)";
        ctx.fillRect(left - 5, top + h, w + 10, 7 * c.depth);
        ctx.strokeStyle = "rgba(255,210,130,0.12)";
        ctx.lineWidth = 0.5;
        ctx.strokeRect(left - 5, top + h, w + 10, 7 * c.depth);
        if (c.item === "ship") drawShip(c.cx, top + h * 0.72, w * 0.68);
        else drawBook(c.cx, top + h * 0.22, w * 0.42, h * 0.50);
        ctx.restore();
      }

      function drawMuseumFigures(opacity) {
        const figH = H * 0.13;
        [{ x: W * 0.455 }, { x: W * 0.48 }, { x: W * 0.505 }].forEach((f) => {
          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.fillStyle = "rgba(255,210,150,0.9)";
          const headR = figH * 0.13,
            bodyW = figH * 0.28,
            bodyH = figH * 0.38,
            legH = figH * 0.32,
            legW = bodyW * 0.38;
          const footY = FLOOR_Y,
            bodyY = footY - legH,
            headCY = bodyY - bodyH - headR;
          ctx.beginPath();
          ctx.arc(f.x, headCY, headR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillRect(f.x - bodyW / 2, bodyY - bodyH, bodyW, bodyH);
          ctx.fillRect(f.x - bodyW * 0.42, bodyY, legW, legH);
          ctx.fillRect(f.x + bodyW * 0.42 - legW, bodyY, legW, legH);
          ctx.restore();
        });
      }

      // Deck / wooden rail shared draw
      function drawWoodenRail(railTop, woodBase) {
        const woodGrad = ctx.createLinearGradient(0, railTop, 0, H);
        woodGrad.addColorStop(0, woodBase || "#1e0f05");
        woodGrad.addColorStop(0.3, "#2a1508");
        woodGrad.addColorStop(0.7, "#180c04");
        woodGrad.addColorStop(1, "#100804");
        ctx.fillStyle = woodGrad;
        ctx.fillRect(0, railTop, W, H - railTop);
        const iY1 = railTop + 14,
          iY2 = railTop + 18;
        const ig = ctx.createLinearGradient(0, 0, W, 0);
        ig.addColorStop(0, "transparent");
        ig.addColorStop(0.1, "rgba(200,155,60,0.6)");
        ig.addColorStop(0.5, "rgba(230,185,80,0.9)");
        ig.addColorStop(0.9, "rgba(200,155,60,0.6)");
        ig.addColorStop(1, "transparent");
        ctx.fillStyle = ig;
        ctx.fillRect(0, iY1, W, 1.5);
        ctx.fillRect(0, iY2, W, 1.5);
        const plankCount = 5,
          plankH = (H - railTop) / plankCount;
        for (let i = 0; i < plankCount; i++) {
          const y = railTop + plankH * i;
          ctx.fillStyle =
            i % 2 === 0 ? "rgba(0,0,0,0.08)" : "rgba(255,200,120,0.04)";
          ctx.fillRect(0, y, W, plankH * 0.9);
          ctx.strokeStyle = "rgba(15,8,3,0.7)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(0, y + plankH * 0.92);
          ctx.lineTo(W, y + plankH * 0.92);
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(0,0,0,0.07)";
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 28; i++) {
          const x = (W / 28) * i + (Math.random() * 8 - 4);
          ctx.beginPath();
          ctx.moveTo(x, railTop);
          ctx.lineTo(x + (Math.random() - 0.5) * 6, H);
          ctx.stroke();
        }
        ctx.fillStyle = "#2a1608";
        ctx.fillRect(0, railTop, W, 8);
        ctx.fillStyle = "rgba(210,165,60,0.5)";
        ctx.fillRect(0, railTop, W, 2.5);
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, railTop + 8, W, 5);
        const wl = ctx.createLinearGradient(0, railTop, W, railTop);
        wl.addColorStop(0, "transparent");
        wl.addColorStop(0.6, "rgba(255,200,120,0.06)");
        wl.addColorStop(1, "transparent");
        ctx.fillStyle = wl;
        ctx.fillRect(0, railTop, W, H - railTop);
      }

      // Storm waves — matches storm.js exactly
      function drawStormWaves(WATERLINE, t) {
        for (let i = 0; i < 12; i++) {
          const baseY = WATERLINE + 15 + i * H * 0.014;
          const amp = 5 + i * 1.2 + Math.sin(t * 0.5 + i) * 3;
          const freq = 0.01 - i * 0.0003;
          const speed = t * (1.8 + i * 0.2);
          ctx.strokeStyle = `rgba(255,255,255,${0.18 - i * 0.01})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          for (let x = 0; x <= W; x += 3) {
            const y =
              baseY +
              Math.sin(x * freq + speed) * amp +
              Math.sin(x * freq * 2.3 - speed * 0.7) * (amp * 0.4);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }

      // Ihsrah side-view waves — matches ihsrah.js exactly
      function drawIhsrahWaves(WATERLINE, t) {
        for (let i = 0; i < 10; i++) {
          const baseY = WATERLINE + 15 + i * H * 0.04;
          const amp = 3 + i * 0.8 + Math.sin(t * 0.5 + i) * 2;
          const freq = 0.01 - i * 0.0003;
          const speed = t * (1.97 + i * 0.15);
          ctx.strokeStyle = `rgba(255,255,255,${0.14 - i * 0.01})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          for (let x = 0; x <= W; x += 3) {
            const y =
              baseY +
              Math.sin(x * freq + speed) * amp +
              Math.sin(x * freq * 2.1 - speed * 0.6) * (amp * 0.35);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }

      // ---- 1. WELCOME ----
      SCENES.welcome = function () {

          "ARIRANG/No29.mp3",
          "ARIRANG/BodytoBody.mp3",
          "ARIRANG/Hooligan.mp3",
          "ARIRANG/Aliens.mp3",
          "ARIRANG/FYA.mp3",
          "ARIRANG/2.mp3",
          "ARIRANG/NORMAL.mp3",
          "ARIRANG/theydontknowboutus.mp3",
          "ARIRANG/OneMoreNight.mp3",
          "ARIRANG/Please.mp3",
          "ARIRANG/IntotheSun.mp3",
        ];
        let loaded = 0;
        audioFiles.forEach((src) => {
          const a = new Audio();
          a.preload = "auto";
          a.src = src;
          const done = () => {
            loaded++;
            if (loaded >= audioFiles.length) ready = true;
          };
          a.addEventListener("canplaythrough", done, { once: true });
          a.addEventListener("error", done, { once: true });
        });
        setTimeout(() => {
          if (!ready) ready = true;
        }, 12000);

        const onMove = (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
        };
        canvas.addEventListener("mousemove", onMove);

        function draw() {
          drawMuseumBackground();
          const cl = ctx.createRadialGradient(
            W / 2,
            -100,
            0,
            W / 2,
            -100,
            H * 0.9,
          );
          cl.addColorStop(0, "rgba(255,210,130,0.12)");
          cl.addColorStop(1, "transparent");
          ctx.fillStyle = cl;
          ctx.fillRect(0, 0, W, H);
          tickParticles(particles);
          drawParticles(particles);
          const breathe = 0.6 + Math.sin(t * 0.6) * 0.2;
          const gg = ctx.createRadialGradient(
            W / 2,
            H / 2,
            0,
            W / 2,
            H / 2,
            W * 0.25,
          );
          gg.addColorStop(0, `rgba(200,155,60,${0.04 * breathe})`);
          gg.addColorStop(1, "transparent");
          ctx.fillStyle = gg;
          ctx.fillRect(0, 0, W, H);
          ctx.save();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `300 ${Math.round(H * 0.042)}px 'Noto Serif KR', serif`;
          ctx.fillStyle = `rgba(40,20,5,${0.9 * breathe})`;
          ctx.fillText("어서 와, 여기는 처음이지?", W / 2 + 2, H / 2 + 2);
          const tg = ctx.createLinearGradient(
            W / 2 - 200,
            H / 2,
            W / 2 + 200,
            H / 2,
          );
          tg.addColorStop(0, `rgba(170,120,35,${breathe})`);
          tg.addColorStop(0.5, `rgba(220,175,80,${breathe})`);
          tg.addColorStop(1, `rgba(170,120,35,${breathe})`);
          ctx.fillStyle = tg;
          ctx.fillText("어서 와, 여기는 처음이지?", W / 2, H / 2);
          ctx.restore();
          const textW = W * 0.38,
            textH = H * 0.06,
            tl = W / 2 - textW / 2,
            tt = H / 2 - textH / 2;
          if (
            mouseX > tl &&
            mouseX < tl + textW &&
            mouseY > tt &&
            mouseY < tt + textH
          ) {
            const tip = "Welcome, this is your first time here, right?";
            const tipY = H / 2 + H * 0.09;
            ctx.save();
            ctx.font = `300 ${Math.round(H * 0.022)}px 'Noto Serif KR', serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const tw = ctx.measureText(tip).width,
              pad = 14;
            ctx.fillStyle = "rgba(10,8,5,0.65)";
            ctx.beginPath();
            ctx.roundRect(W / 2 - tw / 2 - pad, tipY - 14, tw + pad * 2, 28, 4);
            ctx.fill();
            ctx.strokeStyle = "rgba(200,155,60,0.15)";
            ctx.lineWidth = 0.5;
            ctx.stroke();
            ctx.fillStyle = "rgba(200,155,60,0.55)";

          }
          if (!ready) {

              ds = 12,
              dy = H / 2 + H * 0.075,
              dx = W / 2 - ((dc - 1) * ds) / 2;
            for (let i = 0; i < dc; i++) {
              const ph = t * 1.2 - i * 0.5;
              const op = 0.15 + Math.max(0, Math.sin(ph)) * 0.3;
              ctx.beginPath();
              ctx.arc(dx + i * ds, dy, 2, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(200,155,60,${op})`;
              ctx.fill();

        scheduleRAF(() => {
          t += 0.04;
          if (ready) {
            readyTimer++;

              transitioning = true;
              goToScene("doors", 1200);
              return;
            }
          }
          ctx.clearRect(0, 0, W, H);
          draw();
        });

        return {
          destroy() {
            canvas.removeEventListener("mousemove", onMove);
          },

      };

      // ---- 2. DOORS ----
      SCENES.doors = function () {
        let t = 0,
          doorOpen = 0,
          animating = false;
        const particles = makeParticles(50);

        function drawBg() {
          const bg = ctx.createLinearGradient(0, 0, 0, H);
          bg.addColorStop(0, "#0e0b07");

          bg.addColorStop(1, "#060503");
          ctx.fillStyle = bg;

            W / 2,
            H / 2,
            0,
            W / 2,
            H / 2,
            W * 0.4,
          );
          wl.addColorStop(0, `rgba(255,210,130,${0.06 + doorOpen * 0.12})`);
          wl.addColorStop(1, "transparent");
          ctx.fillStyle = wl;
          ctx.fillRect(0, 0, W, H);
        }

        function drawDoors() {
          const doorW = W / 2,
            swing = doorOpen;
          const leftW = doorW * (1 - swing * 0.95);
          const lg = ctx.createLinearGradient(0, 0, leftW, 0);
          lg.addColorStop(0, "#0a0805");
          lg.addColorStop(0.7, "#14100a");
          lg.addColorStop(1, "#1a140e");
          ctx.fillStyle = lg;
          ctx.fillRect(0, 0, leftW, H);
          if (leftW > 5) {
            const ig = ctx.createLinearGradient(0, 0, 0, H);
            ig.addColorStop(0, "transparent");
            ig.addColorStop(0.2, "rgba(200,155,60,0.5)");
            ig.addColorStop(0.8, "rgba(200,155,60,0.5)");
            ig.addColorStop(1, "transparent");
            ctx.fillStyle = ig;
            ctx.fillRect(leftW - 2, 0, 2, H);
            ctx.strokeStyle = `rgba(255,200,100,${0.06 * (1 - swing)})`;
            ctx.lineWidth = 0.5;
            const pm = leftW * 0.12;
            ctx.strokeRect(pm, H * 0.08, leftW - pm * 2, H * 0.38);
            ctx.strokeRect(pm, H * 0.54, leftW - pm * 2, H * 0.38);
            const hx = leftW - leftW * 0.18;
            ctx.beginPath();
            ctx.arc(hx, H / 2, 4 * (1 - swing * 0.8), 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(200,155,60,${0.7 * (1 - swing)})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
          const rightW = doorW * (1 - swing * 0.95),
            rightX = W - rightW;
          const rg = ctx.createLinearGradient(rightX, 0, W, 0);
          rg.addColorStop(0, "#1a140e");
          rg.addColorStop(0.3, "#14100a");
          rg.addColorStop(1, "#0a0805");
          ctx.fillStyle = rg;
          ctx.fillRect(rightX, 0, rightW, H);
          if (rightW > 5) {
            const ig2 = ctx.createLinearGradient(0, 0, 0, H);
            ig2.addColorStop(0, "transparent");
            ig2.addColorStop(0.2, "rgba(200,155,60,0.5)");
            ig2.addColorStop(0.8, "rgba(200,155,60,0.5)");
            ig2.addColorStop(1, "transparent");
            ctx.fillStyle = ig2;
            ctx.fillRect(rightX, 0, 2, H);
            ctx.strokeStyle = `rgba(255,200,100,${0.06 * (1 - swing)})`;
            ctx.lineWidth = 0.5;
            const rpm = rightW * 0.12;
            ctx.strokeRect(rightX + rpm, H * 0.08, rightW - rpm * 2, H * 0.38);
            ctx.strokeRect(rightX + rpm, H * 0.54, rightW - rpm * 2, H * 0.38);
            const rhx = rightX + rightW * 0.18;
            ctx.beginPath();
            ctx.arc(rhx, H / 2, 4 * (1 - swing * 0.8), 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(200,155,60,${0.7 * (1 - swing)})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
          if (doorOpen > 0) {
            const gapW = W * doorOpen * 0.15,
              cx2 = W / 2;
            const gg = ctx.createLinearGradient(cx2 - gapW, 0, cx2 + gapW, 0);
            gg.addColorStop(0, "transparent");
            gg.addColorStop(0.5, `rgba(255,210,130,${doorOpen * 0.15})`);
            gg.addColorStop(1, "transparent");
            ctx.fillStyle = gg;
            ctx.fillRect(cx2 - gapW, 0, gapW * 2, H);
          }
        }

        setCanvasClick(() => {
          if (!animating) {
            animating = true;
            audioPlay("ARIRANG/SWIM.mp3", 0);
          }
        });

        scheduleRAF(() => {
          t += 0.04;
          ctx.clearRect(0, 0, W, H);
          if (animating) {
            const speed = doorOpen < 0.7 ? 0.018 : 0.006;
            doorOpen = Math.min(doorOpen + speed, 1);
            if (doorOpen >= 1) {
              goToScene("intro");
              return;
            }
          }
          drawBg();
          drawDoors();
          tickParticles(particles);
          drawParticles(particles, 0.3 + doorOpen * 0.7);
          drawVignette(0.4 - doorOpen * 0.5);
        });

        return {};
      };

            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(HULL_RIGHT, y);

          });

        function drawPorthole() {
          const px = W * 0.08;
          const py = WATERLINE * 0.27;
          const r = H * 0.087;

          // Outer brass ring
          ctx.beginPath();
          ctx.arc(px, py, r + 5, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(200, 155, 60, 0.9)";
          ctx.lineWidth = 4;
          ctx.stroke();

          // Glass — dark interior
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(8, 18, 28, 0.85)";
          ctx.fill();

          // Warm light inside — empty cabin
          const cl2 = ctx.createRadialGradient(
            px,
            py + r * 0.3,
            0,
            px,
            py,
            r,
          );
          cl2.addColorStop(0, "rgba(255, 200, 120, 0.05)");
          cl2.addColorStop(1, "transparent");
          ctx.fillStyle = cl2;
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fill();

          // Glass glare
          ctx.beginPath();
          ctx.arc(px + r * 0.5, py - r * 0.37, r * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255, 255, 255, 0.02)";
          ctx.fill();

          // Inner ring shadow
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(0,0,0,0.4)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        scheduleRAF(() => {
          t += 0.04;
          sceneTimer++;
          if (sceneTimer >= 90) {
            goToScene("sinking");
            return;
          }
          bobOffset = Math.sin(t * 0.8) * 3;
          ctx.clearRect(0, 0, W, H);
          drawSky();
          drawWater();
          drawHull();
          drawPorthole();
          drawVignette(0.65);
        });
        return {};
      };

      // ---- 7. SINKING ----
      SCENES.sinking = function () {
        let t = 0,
          darkness = 0;
        const bubbles = Array.from({ length: 35 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          size: Math.random() * 3 + 0.6,
          speed: 3 + Math.random() * 77,
          opacity: Math.random() * 0.3 + 0.1,
          wobble: Math.random() * Math.PI * 2,
        }));
        const rays = Array.from({ length: 5 }, (_, i) => ({
          x: W * (0.1 + i * 0.2),
          width: 30 + Math.random() * 40,
        }));

        scheduleRAF(() => {
          t += 0.04;
          darkness = Math.min(t / 72, 1);
          audio.volume = Math.max(0, 1 - darkness * 1.7);
          ctx.clearRect(0, 0, W, H);
          const r = Math.round(42 * (1 - darkness)),
            g2 = Math.round(122 * (1 - darkness)),
            b = Math.round(138 * (1 - darkness));
          ctx.fillStyle = `rgb(${r},${g2},${b})`;
          ctx.fillRect(0, 0, W, H);
          const dg = ctx.createLinearGradient(0, 0, 0, H);
          dg.addColorStop(0, "transparent");
          dg.addColorStop(1, `rgba(0,0,0,${0.4 + darkness * 0.6})`);
          ctx.fillStyle = dg;
          ctx.fillRect(0, 0, W, H);
          if (darkness <= 0.7) {
            const ro = (1 - darkness / 0.7) * 0.06;
            rays.forEach((r2) => {
              const rg = ctx.createLinearGradient(
                r2.x,
                0,
                r2.x + r2.width * 0.5,
                H * 0.6,
              );
              rg.addColorStop(0, `rgba(150,220,240,${ro})`);
              rg.addColorStop(1, "transparent");
              ctx.fillStyle = rg;
              ctx.beginPath();
              ctx.moveTo(r2.x, 0);
              ctx.lineTo(r2.x + r2.width, 0);
              ctx.lineTo(r2.x + r2.width * 1.5, H * 0.6);
              ctx.lineTo(r2.x - r2.width * 0.5, H * 0.6);
              ctx.closePath();
              ctx.fill();
            });
          }
          bubbles.forEach((b2) => {
            const op = b2.opacity * (1 - darkness * 0.8);
            if (op <= 0) return;
            ctx.beginPath();
            ctx.arc(b2.x, b2.y, b2.size, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(180,230,245,${op})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
            b2.y -= b2.speed;
            b2.x += Math.sin(t * 0.5 + b2.wobble) * 0.3;
            if (b2.y < -5) {
              b2.y = H + 5;
              b2.x = Math.random() * W;
            }
          });
          if (darkness > 0) {
            ctx.fillStyle = `rgba(0,0,0,${darkness})`;
            ctx.fillRect(0, 0, W, H);
          }
          if (darkness >= 1) {
            goToScene("underwater");
            return;
          }
        });

        return {
          destroy() {
            /* leave volume at 0 — underwater will manage it */
          },
        };
      };

        // appAnalyserData = null;
        // try {
        //   console.log(

        //   appAudioCtx = new (

        //   appAnalyser = appAudioCtx.createAnalyser();

        //   const source = appAudioCtx.createMediaElementSource(audio);

        //   console.log(

        // } catch (e) {
        //   console.error("Audio graph setup FAILED:", e);
        //   appAudioCtx = null;
        //   appAnalyser = null;
        // }

        scheduleRAF(() => {
          t += 0.04;
          blinkTimer++;
          if (blinkIndex >= blinks.length) {
            eyeOpen = Math.min(eyeOpen + 0.035, 1);
          } else {
            const bk = blinks[blinkIndex];
            if (blinkTimer < bk.openAt) {
              eyeOpen = 0;
            } else if (blinkTimer < bk.closeAt) {
              eyeOpen = Math.sin(
                ((blinkTimer - bk.openAt) / (bk.closeAt - bk.openAt)) * Math.PI,
              );
            } else {
              blinkIndex++;
            }
          }
          if (blinkIndex >= 2 && !audioStarted) {
            audioStarted = true;
            audio.src = "ARIRANG/MerryGoRound.mp3";
            audio.currentTime = 0;
            if (appAudioCtx) appAudioCtx.resume();
            audio.play().catch(() => {});
            fadeInAudio(1000);
          }
          if (eyeOpen >= 1 && blinkIndex >= blinks.length && !eyesFullyOpen)
            eyesFullyOpen = true;
          if (eyesFullyOpen) {
            openTimer++;

              goToSceneImmediate("swim");

          ctx.clearRect(0, 0, W, H);
          // water
          const wg = ctx.createLinearGradient(0, 0, 0, H);
          wg.addColorStop(0, "#040f14");
          wg.addColorStop(0.5, "#030a0e");
          wg.addColorStop(1, "#020608");
          ctx.fillStyle = wg;
          ctx.fillRect(0, 0, W, H);
          // rays
          rays2.forEach((r, i) => {

            rg.addColorStop(0, "rgba(100,200,220,0.03)");
            rg.addColorStop(1, "transparent");
            ctx.fillStyle = rg;
            ctx.beginPath();
            ctx.moveTo(r.x + sw, 0);
            ctx.lineTo(r.x + sw + r.width, 0);
            ctx.lineTo(r.x + sw + r.width * 2, H * 0.8);
            ctx.lineTo(r.x + sw - r.width, H * 0.8);
            ctx.closePath();
            ctx.fill();
          });
          // bubbles
          bubbles.forEach((b2) => {
            ctx.beginPath();
            ctx.arc(b2.x, b2.y, b2.size, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(150,210,230,${b2.opacity})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
            b2.y -= b2.speed;
            b2.x += Math.sin(t * 1.2 + b2.wobble) * 1.2;
            if (b2.y < -5) {
              b2.y = H + 5;
              b2.x = Math.random() * W;
            }
          });
          // blink
          if (eyeOpen < 1) {
            const lidH = H * 0.5 * (1 - eyeOpen);
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(W, 0);
            ctx.lineTo(W, lidH);
            ctx.quadraticCurveTo(W / 2, lidH + H * 0.04, 0, lidH);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(0, H);
            ctx.lineTo(W, H);
            ctx.lineTo(W, H - lidH);
            ctx.quadraticCurveTo(W / 2, H - lidH - H * 0.04, 0, H - lidH);
            ctx.closePath();
            ctx.fill();
            const te = ctx.createLinearGradient(0, lidH, 0, lidH + H * 0.08);
            te.addColorStop(0, "rgba(0,0,0,0.8)");
            te.addColorStop(1, "transparent");
            ctx.fillStyle = te;
            ctx.fillRect(0, lidH, W, H * 0.08);
            const be = ctx.createLinearGradient(
              0,
              H - lidH - H * 0.08,
              0,
              H - lidH,
            );
            be.addColorStop(0, "transparent");
            be.addColorStop(1, "rgba(0,0,0,0.8)");
            ctx.fillStyle = be;
            ctx.fillRect(0, H - lidH - H * 0.08, W, H * 0.08);
          }
        });
        return {};
      };

          const fakeRhythms = [

            if (appAnalyser) {

              b.el.style.boxShadow = `0 0 ${glow}px ${glow * 0.4}px rgba(220,175,70,${glowOpacity})`;
            });
            animFr = requestAnimationFrame(animBlobs);

          animBlobs();

          <img id="tu-flower-castle" src="assets/icons/flower.svg" style="
          position:absolute;
          width:${Math.round(manSize * 0.36)}px; height:${Math.round(manSize * 0.36)}px;
          left:50%; bottom:20%;
          transform:translateX(-50%);
          display:none;
          pointer-events:none;
          opacity:0.9;
          "/>
          </div>`;

          // Snap threshold — proportional to page width
          const snapDist = pageW * 0.5;
          const castleSnapDist = pageW * 0.35;

          function getEl(id) {
            return document.getElementById(id);
          }

          function snapCenter(el) {
            const r = el.getBoundingClientRect();
            return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
          }

          function dist(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
          }

          function startDrag(el, e) {
            dragging = el;
            const rect = el.getBoundingClientRect();
            dragOffX = e.clientX - rect.left;
            dragOffY = e.clientY - rect.top;
            el.style.position = "fixed";
            el.style.width = rect.width + "px";
            el.style.height = rect.height + "px";
            el.style.left = rect.left + "px";
            el.style.top = rect.top + "px";
            el.style.transform = "none";
            el.style.cursor = "grabbing";
            el.style.zIndex = 9999;
            el.style.pointerEvents = "none";
          }

          function startGroupDrag(e) {
            const manRect = getEl("tu-man").getBoundingClientRect();

            const offsetX = Math.round(manSize * 0.15);
            const offsetY = Math.round(manSize * 0.35);

            // Mask on face — top centre of man
            const maskOffX = Math.round(manSize * 0.375);
            const maskOffY = Math.round(manSize * 0.15);

            // Flower in hand — mid right of man
            const flowerOffX = Math.round(manSize * 0.43);
            const flowerOffY = Math.round(manSize * 0.52);

            const groupW = Math.round(manSize * 1.3);
            const groupH = Math.round(manSize * 1.5);

            groupEl = document.createElement("div");
            groupEl.id = "tu-group";
            groupEl.style.cssText = `
            position:fixed;
            left:${manRect.left - offsetX}px;
            top:${manRect.top - offsetY}px;
            width:${groupW}px; height:${groupH}px;
            cursor:grabbing;
            z-index:9999;
            pointer-events:none;
            `;
            groupEl.innerHTML = `
            <img src="assets/icons/man.svg"    style="position:absolute;width:${manSize}px;height:${manSize}px;left:0;top:${Math.round(manSize * 0.2)}px;"/>
            <img src="assets/icons/mask.svg"   style="position:absolute;width:${maskPlacedSize}px;height:${maskPlacedSize}px;left:${maskOffX}px;top:${maskOffY}px;"/>
            <img src="assets/icons/flower.svg" style="position:absolute;width:${flowerHandSize}px;height:${flowerHandSize}px;left:${flowerOffX}px;top:${flowerOffY}px;"/>
            `;
            document.body.appendChild(groupEl);
            getEl("tu-man").style.opacity = "0";
            getEl("tu-mask-placed").style.display = "none";
            getEl("tu-flower-hand").style.display = "none";
            dragOffX = e.clientX - manRect.left + offsetX;
            dragOffY = e.clientY - manRect.top + offsetY;
            dragging = groupEl;
          }

          function onMove(e) {
            if (!dragging) return;
            dragging.style.left = e.clientX - dragOffX + "px";
            dragging.style.top = e.clientY - dragOffY + "px";
          }

          function onUp(e) {
            if (!dragging) return;
            const dropped = dragging;
            const dropCenter = { x: e.clientX, y: e.clientY };
            dragging = null;

            if (dropped.id === "tu-mask-drag" && !maskPlaced) {
              dropped.style.pointerEvents = "auto";
              dropped.style.cursor = "grab";

              const target = snapCenter(getEl("tu-man"));
              if (dist(dropCenter, target) < snapDist) {
                dropped.style.display = "none";
                getEl("tu-mask-placed").style.display = "block";
                maskPlaced = true;
                if (flowerPlaced) enableManDrag();
              } else {
                dropped.style.position = "absolute";
                dropped.style.left = "70%";
                dropped.style.top = "15%";
                dropped.style.transform = "translate(-50%,0)";
                dropped.style.width = maskSize + "px";
                dropped.style.height = maskSize + "px";
                dropped.style.zIndex = "";
              }
            } else if (dropped.id === "tu-flower-feet" && !flowerPlaced) {
              dropped.style.pointerEvents = "auto";
              dropped.style.cursor = "grab";
              const target = snapCenter(getEl("tu-man"));
              if (dist(dropCenter, target) < snapDist) {
                dropped.style.display = "none";
                getEl("tu-flower-hand").style.display = "block";
                flowerPlaced = true;
                if (maskPlaced) enableManDrag();
              } else {
                dropped.style.position = "absolute";
                dropped.style.left = "70%";
                dropped.style.top = "70%";
                dropped.style.transform = "translate(-50%,-50%)";
                dropped.style.width = flowerSize + "px";
                dropped.style.height = flowerSize + "px";
                dropped.style.zIndex = "";
              }
            } else if (dropped === groupEl) {
              const target = snapCenter(getEl("tu-castle-zone"));
              if (dist(dropCenter, target) < castleSnapDist) {
                groupEl.remove();
                groupEl = null;
                getEl("tu-man").style.display = "none";
                getEl("tu-flower-castle").style.display = "block";
                setTimeout(() => closeBook(true), 2500);
              } else {
                groupEl.remove();
                groupEl = null;
                getEl("tu-man").style.opacity = "1";
                getEl("tu-mask-placed").style.display = "block";
                getEl("tu-flower-hand").style.display = "block";
              }
            }
          }

          function enableManDrag() {
            getEl("tu-man").style.cursor = "grab";
            getEl("tu-castle-zone").style.display = "block";
          }

          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);

          getEl("tu-mask-drag").addEventListener("mousedown", (e) => {
            if (maskPlaced) return;
            e.preventDefault();
            startDrag(getEl("tu-mask-drag"), e);
          });

          getEl("tu-flower-feet").addEventListener("mousedown", (e) => {
            if (flowerPlaced) return;
            e.preventDefault();
            startDrag(getEl("tu-flower-feet"), e);
          });

          getEl("tu-man").addEventListener("mousedown", (e) => {
            if (!maskPlaced || !flowerPlaced) return;
            e.preventDefault();
            startGroupDrag(e);
          });
        }

        // ---- HOOLIGAN puzzle ----
        const hooliganPatterns = [
          [
            [0, 3],
            [0, 1],
            [1, 2],
            [2, 0],
            [2, 3],
            [3, 1],
            [3, 2],
          ],
          [
            [0, 2],
            [0, 3],
            [1, 0],
            [2, 2],
            [2, 3],
            [3, 0],
            [3, 1],
          ],
          [
            [0, 0],
            [1, 2],
            [1, 3],
            [2, 3],
            [3, 1],
            [3, 2],
            [3, 3],
          ],
          [
            [0, 1],
            [1, 0],
            [1, 3],
            [2, 2],
            [3, 0],
            [3, 2],
            [3, 3],
          ],
          [
            [0, 3],
            [1, 1],
            [2, 0],
            [2, 2],

        function renderHooligan() {
          const lastIdx = parseInt(
            localStorage.getItem("hooligan_last_pattern") ?? "-1",
          );
          let pi;
          do {
            pi = Math.floor(Math.random() * hooliganPatterns.length);
          } while (pi === lastIdx && hooliganPatterns.length > 1);
          localStorage.setItem("hooligan_last_pattern", pi);
          const pattern = hooliganPatterns[pi];
          const ROWS = 4,
            COLS = 4;
          let replaysLeft = 2,
            isPlaying = false;
          function buildGrid(id, interactive) {
            return `<div id="${id}" style="display:grid;grid-template-columns:repeat(${COLS},1fr);grid-template-rows:repeat(${ROWS},1fr);gap:8px;width:100%;height:100%;">${Array.from(
              { length: ROWS * COLS },
              (_, i) => {
                const row = Math.floor(i / COLS),
                  col = i % COLS;
                return `<div class="synth-cell ${interactive ? "synth-input" : "synth-show"}" data-row="${row}" data-col="${col}" style="background:rgba(160,120,50,0.08);border:1px solid rgba(160,120,50,0.2);border-radius:3px;cursor:${interactive ? "pointer" : "default"};transition:background 0.15s,border-color 0.15s;"></div>`;
              },
            ).join("")}</div>`;
          }
          puzzleLeft.innerHTML = `<div style="width:85%;height:70%;display:flex;flex-direction:column;gap:16px;align-items:center;">${buildGrid("synth-left", false).replace("width:100%", "width:100%").replace("height:100%", "flex:1")}</div>`;
          puzzleRight.innerHTML = "";
          const userPattern = [];
          function playPattern(onDone) {
            isPlaying = true;
            document
              .querySelectorAll("#synth-left .synth-show")
              .forEach((c) => {
                c.style.background = "rgba(160,120,50,0.08)";
                c.style.borderColor = "rgba(160,120,50,0.2)";
              });
            let step = 0;
            function lightNext() {
              if (step >= pattern.length) {
                setTimeout(() => {
                  document
                    .querySelectorAll("#synth-left .synth-show")
                    .forEach((c) => {
                      c.style.background = "rgba(160,120,50,0.04)";
                      c.style.borderColor = "rgba(160,120,50,0.1)";
                    });
                  isPlaying = false;
                  if (onDone) onDone();
                }, 800);
                return;
              }
              const [col, row] = pattern[step];
              const cell = document.querySelector(
                `#synth-left [data-row="${row}"][data-col="${col}"]`,
              );
              if (cell) {
                cell.style.background = "rgba(180,130,40,0.55)";
                cell.style.borderColor = "rgba(220,175,70,0.8)";
              }
              step++;
              setTimeout(lightNext, 400);
            }
            setTimeout(lightNext, 300);
          }
          function showRightGrid() {
            userPattern.length = 0;
            puzzleRight.innerHTML = buildGrid("synth-right", true);
            document
              .querySelectorAll("#synth-right .synth-input")
              .forEach((cell) => {
                cell.addEventListener("click", () => {
                  if (isPlaying) return;
                  const row = parseInt(cell.dataset.row),
                    col = parseInt(cell.dataset.col);
                  const already = userPattern.some(
                    (p) => p[0] === col && p[1] === row,
                  );
                  if (already) {
                    userPattern.splice(
                      userPattern.findIndex(
                        (p) => p[0] === col && p[1] === row,
                      ),
                      1,
                    );
                    cell.style.background = "rgba(160,120,50,0.08)";
                    cell.style.borderColor = "rgba(160,120,50,0.2)";
                  } else {
                    userPattern.push([col, row]);
                    cell.style.background = "rgba(180,130,40,0.45)";
                    cell.style.borderColor = "rgba(220,175,70,0.7)";
                  }
                  if (userPattern.length === pattern.length) {
                    const ps = new Set(pattern.map((p) => `${p[0]},${p[1]}`));
                    const us = new Set(
                      userPattern.map((p) => `${p[0]},${p[1]}`),
                    );
                    const correct = [...ps].every((k) => us.has(k));
                    if (correct) {
                      document
                        .querySelectorAll("#synth-right .synth-input")
                        .forEach((c) => {
                          if (us.has(`${c.dataset.col},${c.dataset.row}`)) {
                            c.style.background = "rgba(100,150,70,0.3)";
                            c.style.borderColor = "rgba(120,170,80,0.6)";
                          }
                        });
                      setTimeout(() => closeBook(true), 700);
                    } else {
                      document
                        .querySelectorAll("#synth-right .synth-input")
                        .forEach((c) => {
                          c.style.background = "rgba(160,60,40,0.15)";
                          c.style.borderColor = "rgba(160,60,40,0.4)";
                        });
                      setTimeout(() => {
                        if (replaysLeft <= 0) {
                          closeBook(false);
                          currentChest = 0;
                          swimChests.forEach((c) => (c.solved = false));
                          scrollY = WORLD_H - H * 0.75;
                          targetScrollY = scrollY;
                          scrollLocked = false;
                          autoScrolling = false;
                        } else {
                          userPattern.length = 0;
                          document
                            .querySelectorAll("#synth-right .synth-input")
                            .forEach((c) => {
                              c.style.background = "rgba(160,120,50,0.08)";
                              c.style.borderColor = "rgba(160,120,50,0.2)";
                            });
                        }
                      }, 600);
                    }
                  }
                });
              });
            updateReplayBtn();
          }
          function updateReplayBtn() {
            const ex = document.getElementById("replay-btn");
            if (ex) ex.remove();
            if (replaysLeft <= 0) return;
            const btn = document.createElement("button");
            btn.id = "replay-btn";
            btn.textContent = `replay (${replaysLeft} left)`;
            btn.style.cssText = `position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:transparent;border:1px solid rgba(160,120,50,0.4);color:rgba(90,55,15,0.7);font-family:Georgia,serif;font-style:italic;font-size:0.85rem;padding:7px 18px;cursor:pointer;letter-spacing:0.05em;`;
            btn.addEventListener("click", () => {
              if (isPlaying) return;
              replaysLeft--;
              puzzleRight.innerHTML = "";
              document
                .querySelectorAll("#synth-left .synth-show")
                .forEach((c) => {
                  c.style.background = "rgba(160,120,50,0.08)";
                  c.style.borderColor = "rgba(160,120,50,0.2)";
                });
              playPattern(() => showRightGrid());
            });
            puzzleLeft.style.position = "relative";
            puzzleLeft.appendChild(btn);
          }
          playPattern(() => showRightGrid());
        }

        // ---- NORMAL puzzle ----
        function renderNormal() {
          puzzleLeft.innerHTML = `<div style="font-family:Georgia,serif;color:rgba(70,42,12,0.75);font-size:1.4rem;font-style:italic;line-height:1.8;text-align:center;padding:20px;">What you need, twin?</div>`;
          const opts = ["Fantasy", "Fame", "Hate", "Love"];

          document.querySelectorAll(".normal-option").forEach((el, i) => {

        // ---- ODD ONE OUT puzzle ----
        function renderOddOneOut() {
          puzzleLeft.innerHTML = `<div style="font-family:Georgia,serif;color:rgba(70,42,12,0.75);font-size:1.4rem;font-style:italic;line-height:1.8;text-align:center;padding:20px;">Is it different for me?<br>Is it different for you?</div>`;
          const opts = [
            { emoji: "🌊", correct: false },
            { emoji: "💜", correct: true },
            { emoji: "7", correct: false },
            { emoji: "🥀", correct: false },

          puzzleRight.innerHTML = `<div id="odd-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:20px;margin:auto;">${opts.map((o, i) => `<div class="odd-option" data-index="${i}" style="display:flex;align-items:center;justify-content:center;width:100px;height:100px;font-size:2.4rem;border:1px solid rgba(160,120,50,0.2);border-radius:4px;cursor:pointer;transition:background 0.2s,border-color 0.2s;background:transparent;user-select:none;">${o.emoji}</div>`).join("")}</div>`;
          document.querySelectorAll(".odd-option").forEach((el, i) => {
            el.addEventListener("mouseenter", () => {

            });
            el.addEventListener("mouseleave", () => {
              el.style.background = "transparent";
              el.style.borderColor = "rgba(160,120,50,0.2)";
            });
            el.addEventListener("click", () => {
              if (opts[i].correct) {

              } else {
                el.style.background = "rgba(160,60,40,0.12)";
                el.style.borderColor = "rgba(160,60,40,0.4)";
                setTimeout(() => {
                  closeBook(false);
                  currentChest = 0;
                  swimChests.forEach((c) => (c.solved = false));
